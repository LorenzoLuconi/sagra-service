services:
  mysql:
    image: mysql:8.4
    container_name: sagra-mysql
    environment:
      MYSQL_DATABASE: sagra
      MYSQL_USER: sagra
      MYSQL_PASSWORD: sagra
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: sagra-app
    working_dir: /workspace
    command: ["./mvnw", "spring-boot:run", "-DskipTests"]
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sagra?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: sagra
      SPRING_DATASOURCE_PASSWORD: sagra
      SERVER_ADDRESS: 0.0.0.0
      SAGRA_SERVICE_DEFAULT_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
      - maven-repo:/root/.m2

  mysql-seed:
    image: mysql:8.4
    container_name: sagra-mysql-seed
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    working_dir: /seed
    volumes:
      - ./data-test.sql:/seed/data-test.sql:ro
    entrypoint:
      - sh
      - -c
      - |
        until mysql --default-character-set=utf8mb4 -hmysql -usagra -psagra -D sagra -Nse "select 1 from information_schema.tables where table_schema='sagra' and table_name='users'" | grep -q 1; do
          sleep 2
        done
        mysql --default-character-set=utf8mb4 -hmysql -usagra -psagra -D sagra < /seed/data-test.sql

volumes:
  mysql-data:
  maven-repo:
