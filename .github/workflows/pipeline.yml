name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - '*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        run: ./mvnw verify

      - name: Collect build data
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        id: build-data
        run: echo "jar_name=$(./mvnw help:evaluate -Dexpression=project.build.finalName -q -DforceStdout).jar" >> "$GITHUB_OUTPUT"

      - name: Upload packaged application
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: packaged-application
          path: |
            target/${{ steps.build-data.outputs.jar_name }}
            target/${{ steps.build-data.outputs.jar_name }}.original
          if-no-files-found: error

  push-to-dockerhub:
    needs: build-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download packaged application
        uses: actions/download-artifact@v4
        with:
          name: packaged-application
          path: target

      - name: Build and Push Docker Image
        run: |
          ./mvnw spring-boot:build-image-no-fork \
            -Dspring-boot.build-image.imageName=${{ secrets.DOCKERHUB_USERNAME }}/sagra-service:${{ github.ref_name }}-${{ matrix.arch }} \
            -Dspring-boot.build-image.imagePlatform=${{ matrix.platform }} \
            -Dspring-boot.build-image.publish=true

  publish-multi-arch-manifest:
    needs: push-to-dockerhub
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/sagra-service:${{ github.ref_name }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/sagra-service:${{ github.ref_name }}-amd64 \
            ${{ secrets.DOCKERHUB_USERNAME }}/sagra-service:${{ github.ref_name }}-arm64
